# Vhost de referencia para vidra-ia.com en Cyberneticos EvoHosting.
#
# Cyberneticos usa nginx como servidor web, por lo que el .htaccess que
# sube el CI/CD (deploy-web.yml) es IGNORADO. Las cabeceras de seguridad
# deben configurarse aquí o solicitarse a soporte de Cyberneticos.
#
# INSTRUCCIONES PARA CYBERNETICOS:
#   Opción A — Panel EvoHosting:
#     Ir a "Dominios" → "vidra-ia.com" → "Configuración avanzada" → "Custom nginx directives"
#     y pegar el bloque add_header de abajo.
#   Opción B — Soporte Cyberneticos:
#     Enviar este fichero y pedir que apliquen la sección "Security headers" al vhost de vidra-ia.com.
#
# NOTA: No sustituir este archivo por la config completa si no se tiene acceso root al servidor.
# Solo la sección add_header es lo que se necesita añadir al vhost existente de Cyberneticos.

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;

    server_name vidra-ia.com www.vidra-ia.com;

    # SSL (gestionado por Cyberneticos/Let's Encrypt)
    # ssl_certificate / ssl_certificate_key configurados por EvoHosting

    # ── Ocultar versión del servidor ──────────────────────────────────────────
    server_tokens off;

    # ── Cabeceras de seguridad HTTP (VID-004) ─────────────────────────────────
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://www.google.com https://www.gstatic.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; connect-src 'self' https://api.vidra-ia.com; img-src 'self' data:; frame-src 'none'; object-src 'none'; base-uri 'self';" always;

    # ── Raíz del sitio (ajustar a la ruta real en Cyberneticos) ──────────────
    root /domains/vidra-ia.com/public_html;
    index index.html;

    # SPA/SSG fallback para rutas de Astro
    location / {
        try_files $uri $uri/ $uri.html =404;
    }

    # Caché de assets con hash (Astro build)
    location ~* \.(css|js|woff2|woff|ttf|svg|png|jpg|jpeg|gif|ico|webp)$ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }
}

# Redirección HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name vidra-ia.com www.vidra-ia.com;
    return 301 https://vidra-ia.com$request_uri;
}
