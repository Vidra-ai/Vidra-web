# Vhost de producción para api.vidra-ia.com (vidra-central, Hetzner)
# Aplicar en: /etc/nginx/sites-available/api.vidra-ia.com
# Activar:    ln -s /etc/nginx/sites-available/api.vidra-ia.com /etc/nginx/sites-enabled/
# Recargar:   nginx -t && systemctl reload nginx
#
# REQUIERE: /etc/nginx/conf.d/rate-limits.conf con:
#   limit_req_zone $binary_remote_addr zone=chat_api:10m rate=10r/m;
#   limit_req_status 429;

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;

    server_name api.vidra-ia.com;

    ssl_certificate     /etc/letsencrypt/live/api.vidra-ia.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.vidra-ia.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ── Ocultar versión del servidor (VID-007) ──────────────────────────────
    server_tokens off;

    # ── Cabeceras de seguridad HTTP (VID-004) ───────────────────────────────
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # ── Rate limiting nginx para /rag/chat (VID-006 — defensa en profundidad) ─
    location /rag/chat {
        limit_req zone=chat_api burst=5 nodelay;
        proxy_pass         http://127.0.0.1:8001;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout    120s;
        proxy_connect_timeout 10s;
        proxy_buffering       off;
    }

    # ── Proxy hacia la API FastAPI (uvicorn en localhost:8001) ──────────────
    location / {
        proxy_pass         http://127.0.0.1:8001;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout    120s;
        proxy_connect_timeout 10s;
        proxy_buffering       off;
    }
}

# ── Redirección HTTP → HTTPS ────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name api.vidra-ia.com;
    return 301 https://$host$request_uri;
}
