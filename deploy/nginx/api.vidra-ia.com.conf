# Vhost de producción para api.vidra-ia.com (vidra-central, Hetzner)
# Aplicar en: /etc/nginx/sites-available/api.vidra-ia.com
# Activar:    ln -s /etc/nginx/sites-available/api.vidra-ia.com /etc/nginx/sites-enabled/
# Recargar:   nginx -t && systemctl reload nginx

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;

    server_name api.vidra-ia.com;

    ssl_certificate     /etc/letsencrypt/live/api.vidra-ia.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.vidra-ia.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ── Ocultar versión del servidor (VID-007) ──────────────────────────────
    server_tokens off;

    # ── Cabeceras de seguridad HTTP (VID-004) ───────────────────────────────
    # HSTS: forzar HTTPS durante 1 año, incluyendo subdominios
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    # Evitar clickjacking — la API no debe ser enmarcada
    add_header X-Frame-Options "DENY" always;
    # Evitar MIME sniffing
    add_header X-Content-Type-Options "nosniff" always;
    # Limitar información de referrer enviada a terceros
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    # Denegar acceso a APIs del navegador no necesarias
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # ── Proxy hacia la API FastAPI (uvicorn en localhost:8001) ──────────────
    location / {
        proxy_pass         http://127.0.0.1:8001;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;

        # Deshabilitar buffering para respuestas streaming (si se activa en el futuro)
        proxy_buffering off;
    }
}

# ── Redirección HTTP → HTTPS ────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name api.vidra-ia.com;
    return 301 https://$host$request_uri;
}
