# Stack de PRODUCCIÓN para vidra-central (Control Plane).
#
# - La web Astro NO va aquí: se compila estática (con PUBLIC_API_URL apuntando al
#   dominio público de la API) y la sirve Nginx. Aquí solo viven la API y su DB.
# - La DB no se expone a ninguna interfaz; solo es accesible en la red interna.
# - La API escucha en 127.0.0.1; Nginx (ya instalado) hace de proxy inverso + SSL.
# - Imágenes desde GHCR (patrón ADR-006/ADR-007). El `build` es solo respaldo manual.
#
# Variables en .env (valores reales en Vaultwarden, nunca commiteadas). Ver DEPLOY.md.
#   docker compose -f docker-compose.prod.yml up -d
services:
  db:
    image: pgvector/pgvector:pg16
    container_name: vidra_chatbot_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - vidra_chatbot_pgdata:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5435:5432"
    networks:
      - chatbot_internal
      - vidra_internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    image: ${CHATBOT_API_IMAGE:-ghcr.io/vidra-ai/vidra-web-chatbot:latest}
    build: ./backend
    container_name: vidra_chatbot_api
    restart: unless-stopped
    user: "1003:1003"
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      LLM_PROVIDER: ${LLM_PROVIDER:-openai}
      LLM_MODEL: ${LLM_MODEL:-gpt-4o-mini}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      ADMIN_API_KEY: ${ADMIN_API_KEY}
      VIDRA_API_URL: ${VIDRA_API_URL:-http://vidra_api_core:8000}
      VIDRA_API_KEY: ${VIDRA_API_KEY:-}
      CORS_ORIGINS: ${CORS_ORIGINS:-https://vidra-ia.com}
      API_DOCS_ENABLED: "false"
      # Sincronización de la carpeta pública del vault Obsidian. El host la mantiene
      # actualizada vía rclone+MEGA (cron) en PUBLIC_DOCS_HOST_DIR; el backend re-embebe
      # solo los .md que cambian. Vacío = desactivada.
      PUBLIC_DOCS_DIR: ${PUBLIC_DOCS_DIR:-/vault-publico}
      PUBLIC_DOCS_SYNC_INTERVAL: ${PUBLIC_DOCS_SYNC_INTERVAL:-30}
    # Producción: sin --reload, con proxy headers (para X-Forwarded-For / rate limit).
    # 1 worker basta: los endpoints síncronos usan el threadpool de Starlette para la
    # E/S bloqueante (OpenAI). Subir UVICORN_WORKERS implica mover el rate limit a Redis.
    command: >
      uvicorn app.main:app --host 0.0.0.0 --port 8000
      --workers ${UVICORN_WORKERS:-1} --proxy-headers --forwarded-allow-ips=*
    ports:
      # Solo localhost: Nginx hace de proxy inverso público con SSL.
      - "127.0.0.1:8001:8000"
    volumes:
      # Documentación RAG persistente (no se hornea en la imagen).
      - ./backend/RAG:/app/RAG
      # Carpeta "Información pública" del vault Obsidian (solo lectura). El host la
      # sincroniza desde MEGA vía rclone+cron. PUBLIC_DOCS_HOST_DIR se define en el .env
      # del servidor (ej. /opt/vidra/apps/chatbot/vault-publico).
      - "${PUBLIC_DOCS_HOST_DIR:-./vault-publico}:/vault-publico:ro"
    networks:
      - chatbot_internal
      - vidra_internal

networks:
  chatbot_internal:
    name: vidra_chatbot_internal
  vidra_internal:
    external: true

volumes:
  vidra_chatbot_pgdata:
    name: vidra_chatbot_pgdata
