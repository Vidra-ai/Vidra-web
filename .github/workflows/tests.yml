name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  # ── pytest: tests de integración contra api.vidra-ia.com ──────────────────
  test-api:
    name: API Integration Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: pip install -r backend/requirements.txt -r backend/requirements-dev.txt

      - name: Run pytest
        # --ignore=test_ssh.py: SSH tests require TEST_SSH=1 and network access to Hetzner
        # -m "not slow": rate limit tests need 60s cooldown between runs (run manually)
        run: pytest backend/tests/ -v --tb=short -m "not slow" --ignore=backend/tests/test_ssh.py

  # ── Playwright: E2E contra vidra-ia.com ────────────────────────────────────
  test-web:
    name: Web E2E Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: tests/package-lock.json

      - name: Install npm dependencies
        working-directory: tests
        run: npm ci

      - name: Install Playwright browsers
        working-directory: tests
        run: npx playwright install chromium --with-deps

      - name: Run Playwright tests
        working-directory: tests
        run: npm test

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: tests/playwright-report/
          retention-days: 7
