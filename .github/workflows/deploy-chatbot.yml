name: Build & Deploy Chatbot

on:
  push:
    tags:
      - "v*"

env:
  IMAGE: ghcr.io/vidra-ai/vidra-web-chatbot

jobs:
  build:
    name: Build & push image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      actions: write
    outputs:
      tag: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=chatbot
          cache-to: type=gha,mode=max,scope=chatbot

  deploy:
    name: Deploy to vidra-central
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_KEY }}

      - name: Add server to known hosts
        run: |
          mkdir -p ~/.ssh
          echo "[178.104.197.240]:55022 ecdsa-sha2-nistp256 AAAAE2VjZHNhLXNoYTItbmlzdHAyNTYAAAAIbmlzdHAyNTYAAABBBANV1G7NmHybqvWIyFCqzHPf2shMJSI1fR/Qls3MNYZzzkmuWW0j5lDqn3u0vig0niMK8XLd2Nbi2aj4sN+GwFc=" >> ~/.ssh/known_hosts
          echo "[178.104.197.240]:55022 ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIINRMSK6qkMyP4N7u38n6/8uNbtAZEQa2877idaQ57o7" >> ~/.ssh/known_hosts

      - name: Deploy to vidra-central
        run: |
          ssh -p 55022 acarrera@178.104.197.240 "
            cd ~/vidra-chatbot &&
            docker compose -f docker-compose.prod.yml pull &&
            docker compose -f docker-compose.prod.yml up -d &&
            docker image prune -f
          "
