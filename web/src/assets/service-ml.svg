<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 900" preserveAspectRatio="xMidYMid slice" width="900" height="900">
  <defs>
    <linearGradient id="bg-m" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d2f4a"/>
      <stop offset="100%" stop-color="#071729"/>
    </linearGradient>
    <radialGradient id="glow-m" cx="0.1" cy="0.0" r="0.7">
      <stop offset="0%" stop-color="#00B2EB" stop-opacity="0.09"/>
      <stop offset="100%" stop-color="#00B2EB" stop-opacity="0"/>
    </radialGradient>
    <pattern id="dots-m" x="0" y="0" width="22" height="22" patternUnits="userSpaceOnUse">
      <circle cx="11" cy="11" r="0.85" fill="rgba(255,255,255,0.048)"/>
    </pattern>
    <linearGradient id="pred-glow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00B2EB" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#00B2EB"/>
    </linearGradient>
  </defs>

  <rect width="900" height="900" fill="url(#bg-m)"/>
  <rect width="900" height="900" fill="url(#dots-m)"/>
  <rect width="900" height="900" fill="url(#glow-m)"/>

  <!-- Badge -->
  <rect x="60" y="130" width="218" height="28" rx="14" fill="rgba(0,178,235,0.12)" stroke="rgba(0,178,235,0.32)" stroke-width="1"/>
  <text x="169" y="149" fill="#00B2EB" font-size="10.5" font-family="'Courier New',Consolas,monospace" text-anchor="middle" font-weight="700" letter-spacing="0.14em">MOTOR PREDICTIVO ML</text>

  <!-- Heading -->
  <text x="60" y="200" fill="rgba(255,255,255,0.96)" font-size="50" font-family="system-ui,-apple-system,sans-serif" font-weight="700" letter-spacing="-0.035em">Machine</text>
  <text x="60" y="253" fill="rgba(255,255,255,0.96)" font-size="50" font-family="system-ui,-apple-system,sans-serif" font-weight="700" letter-spacing="-0.035em">Learning</text>
  <text x="60" y="277" fill="rgba(255,255,255,0.38)" font-size="14.5" font-family="system-ui,-apple-system,sans-serif" letter-spacing="0.02em">Coste real vs. predicción · Intervalo de confianza 95 %</text>

  <!-- Divider -->
  <line x1="60" y1="293" x2="840" y2="293" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>

  <!-- KPI Cards row -->
  <!-- Card 1: MAE -->
  <rect x="60" y="302" width="178" height="68" rx="10" fill="rgba(0,178,235,0.07)" stroke="rgba(0,178,235,0.18)" stroke-width="1"/>
  <text x="149" y="321" fill="rgba(255,255,255,0.35)" font-size="9.5" font-family="'Courier New',monospace" font-weight="700" letter-spacing="0.13em" text-anchor="middle">ERROR MEDIO ABS.</text>
  <text x="149" y="356" fill="#00B2EB" font-size="28" font-family="system-ui,sans-serif" font-weight="700" letter-spacing="-0.02em" text-anchor="middle">3.2 %</text>

  <!-- Card 2: R² -->
  <rect x="252" y="302" width="178" height="68" rx="10" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="341" y="321" fill="rgba(255,255,255,0.35)" font-size="9.5" font-family="'Courier New',monospace" font-weight="700" letter-spacing="0.13em" text-anchor="middle">COEF. DETERMINACIÓN</text>
  <text x="341" y="356" fill="rgba(255,255,255,0.9)" font-size="28" font-family="system-ui,sans-serif" font-weight="700" letter-spacing="-0.02em" text-anchor="middle">R² 0.96</text>

  <!-- Card 3: IC -->
  <rect x="444" y="302" width="178" height="68" rx="10" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="533" y="321" fill="rgba(255,255,255,0.35)" font-size="9.5" font-family="'Courier New',monospace" font-weight="700" letter-spacing="0.13em" text-anchor="middle">INTERVALO CONF.</text>
  <text x="533" y="356" fill="rgba(255,255,255,0.9)" font-size="28" font-family="system-ui,sans-serif" font-weight="700" letter-spacing="-0.02em" text-anchor="middle">± 4.1 %</text>

  <!-- Card 4: Muestras -->
  <rect x="636" y="302" width="204" height="68" rx="10" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="738" y="321" fill="rgba(255,255,255,0.35)" font-size="9.5" font-family="'Courier New',monospace" font-weight="700" letter-spacing="0.13em" text-anchor="middle">MUESTRAS TRAIN</text>
  <text x="738" y="356" fill="rgba(255,255,255,0.9)" font-size="28" font-family="system-ui,sans-serif" font-weight="700" letter-spacing="-0.02em" text-anchor="middle">847</text>

  <!-- Chart axes -->
  <line x1="80" y1="660" x2="862" y2="660" stroke="rgba(255,255,255,0.14)" stroke-width="1.5"/>
  <line x1="80" y1="390" x2="80" y2="660" stroke="rgba(255,255,255,0.14)" stroke-width="1.5"/>

  <!-- Y-axis labels -->
  <text x="70" y="664" fill="rgba(255,255,255,0.28)" font-size="12" font-family="'Courier New',monospace" text-anchor="end">0</text>
  <text x="70" y="599" fill="rgba(255,255,255,0.28)" font-size="12" font-family="'Courier New',monospace" text-anchor="end">50k</text>
  <text x="70" y="534" fill="rgba(255,255,255,0.28)" font-size="12" font-family="'Courier New',monospace" text-anchor="end">100k</text>
  <text x="70" y="469" fill="rgba(255,255,255,0.28)" font-size="12" font-family="'Courier New',monospace" text-anchor="end">150k</text>
  <text x="70" y="404" fill="rgba(255,255,255,0.28)" font-size="12" font-family="'Courier New',monospace" text-anchor="end">200k</text>

  <!-- Horizontal guide lines (dashed) -->
  <g stroke="rgba(255,255,255,0.055)" stroke-width="1" stroke-dasharray="3,7">
    <line x1="80" y1="599" x2="862" y2="599"/>
    <line x1="80" y1="534" x2="862" y2="534"/>
    <line x1="80" y1="469" x2="862" y2="469"/>
    <line x1="80" y1="404" x2="862" y2="404"/>
  </g>

  <!-- X-axis labels -->
  <text x="154" y="678" fill="rgba(255,255,255,0.28)" font-size="12" font-family="'Courier New',monospace" text-anchor="middle">Ene</text>
  <text x="284" y="678" fill="rgba(255,255,255,0.28)" font-size="12" font-family="'Courier New',monospace" text-anchor="middle">Feb</text>
  <text x="414" y="678" fill="rgba(255,255,255,0.28)" font-size="12" font-family="'Courier New',monospace" text-anchor="middle">Mar</text>
  <text x="544" y="678" fill="rgba(255,255,255,0.28)" font-size="12" font-family="'Courier New',monospace" text-anchor="middle">Abr</text>
  <text x="674" y="678" fill="rgba(255,255,255,0.28)" font-size="12" font-family="'Courier New',monospace" text-anchor="middle">May</text>
  <text x="804" y="678" fill="rgba(255,255,255,0.28)" font-size="12" font-family="'Courier New',monospace" text-anchor="middle">Jun</text>

  <!-- Confidence interval band -->
  <path d="M154,432 L284,392 L414,452 L544,382 L674,422 L804,372
           L804,402 L674,447 L544,412 L414,477 L284,417 L154,457 Z"
        fill="rgba(0,178,235,0.1)"/>

  <!-- Real line (white, noisy) -->
  <polyline
    points="154,450 204,427 254,464 284,410 324,437 374,394 414,457 464,390 514,417 544,400 594,442 634,374 674,437 724,410 764,384 804,397"
    fill="none"
    stroke="rgba(255,255,255,0.6)"
    stroke-width="2"
    stroke-linecap="round"
    stroke-linejoin="round"
    stroke-dasharray="0"/>

  <!-- Prediction line (cyan, smooth) -->
  <path d="M154,444 C214,420 264,430 284,402 S364,407 414,464 S494,392 544,392 S624,437 674,432 S764,390 804,387"
        fill="none"
        stroke="#00B2EB"
        stroke-width="2.8"
        stroke-linecap="round"
        stroke-linejoin="round"/>

  <!-- Data points (real) - larger with subtle glow -->
  <g>
    <circle cx="154" cy="450" r="6" fill="rgba(0,178,235,0.12)"/>
    <circle cx="154" cy="450" r="3.5" fill="rgba(255,255,255,0.85)"/>
    <circle cx="284" cy="410" r="6" fill="rgba(0,178,235,0.12)"/>
    <circle cx="284" cy="410" r="3.5" fill="rgba(255,255,255,0.85)"/>
    <circle cx="414" cy="457" r="6" fill="rgba(0,178,235,0.12)"/>
    <circle cx="414" cy="457" r="3.5" fill="rgba(255,255,255,0.85)"/>
    <circle cx="544" cy="400" r="6" fill="rgba(0,178,235,0.12)"/>
    <circle cx="544" cy="400" r="3.5" fill="rgba(255,255,255,0.85)"/>
    <circle cx="674" cy="437" r="6" fill="rgba(0,178,235,0.12)"/>
    <circle cx="674" cy="437" r="3.5" fill="rgba(255,255,255,0.85)"/>
    <circle cx="804" cy="397" r="6" fill="rgba(0,178,235,0.12)"/>
    <circle cx="804" cy="397" r="3.5" fill="rgba(255,255,255,0.85)"/>
  </g>

  <!-- Legend -->
  <line x1="490" y1="398" x2="518" y2="398" stroke="rgba(255,255,255,0.6)" stroke-width="2"/>
  <circle cx="504" cy="398" r="3" fill="rgba(255,255,255,0.85)"/>
  <text x="524" y="403" fill="rgba(255,255,255,0.52)" font-size="12" font-family="'Courier New',monospace">Real</text>

  <line x1="566" y1="398" x2="594" y2="398" stroke="#00B2EB" stroke-width="2.5"/>
  <text x="600" y="403" fill="rgba(255,255,255,0.52)" font-size="12" font-family="'Courier New',monospace">Predicción</text>

  <!-- Band legend -->
  <rect x="682" y="390" width="24" height="14" rx="3" fill="rgba(0,178,235,0.16)"/>
  <text x="712" y="403" fill="rgba(255,255,255,0.52)" font-size="12" font-family="'Courier New',monospace">IC 95 %</text>

  <!-- Bottom divider -->
  <line x1="60" y1="694" x2="840" y2="694" stroke="rgba(255,255,255,0.055)" stroke-width="1"/>

  <!-- Tech tags -->
  <rect x="60" y="706" width="138" height="26" rx="13" fill="rgba(0,178,235,0.1)" stroke="rgba(0,178,235,0.24)" stroke-width="1"/>
  <text x="129" y="723" fill="#00B2EB" font-size="10.5" font-family="'Courier New',monospace" text-anchor="middle">CatBoost + LSTM</text>

  <rect x="210" y="706" width="138" height="26" rx="13" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.09)" stroke-width="1"/>
  <text x="279" y="723" fill="rgba(255,255,255,0.38)" font-size="10.5" font-family="'Courier New',monospace" text-anchor="middle">LightGBM · XGB</text>

  <rect x="360" y="706" width="138" height="26" rx="13" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.09)" stroke-width="1"/>
  <text x="429" y="723" fill="rgba(255,255,255,0.38)" font-size="10.5" font-family="'Courier New',monospace" text-anchor="middle">FastAPI · Docker</text>
</svg>
