<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" width="1200" height="675">
  <defs>
    <linearGradient id="bg-blog" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0B2C4A"/>
      <stop offset="60%" stop-color="#0d2f4a"/>
      <stop offset="100%" stop-color="#071729"/>
    </linearGradient>
    <radialGradient id="glow-blog-r" cx="0.82" cy="0.3" r="0.55">
      <stop offset="0%" stop-color="#00B2EB" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#00B2EB" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow-blog-l" cx="0.05" cy="0.7" r="0.4">
      <stop offset="0%" stop-color="#0B2C4A" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#00B2EB" stop-opacity="0"/>
    </radialGradient>
    <pattern id="dots-blog" x="0" y="0" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="14" cy="14" r="0.9" fill="rgba(255,255,255,0.045)"/>
    </pattern>
    <filter id="node-blur">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="675" fill="url(#bg-blog)"/>
  <rect width="1200" height="675" fill="url(#dots-blog)"/>
  <rect width="1200" height="675" fill="url(#glow-blog-r)"/>

  <!-- Subtle horizontal rule lines -->
  <g stroke="rgba(255,255,255,0.032)" stroke-width="1">
    <line x1="0" y1="135" x2="1200" y2="135"/>
    <line x1="0" y1="270" x2="1200" y2="270"/>
    <line x1="0" y1="405" x2="1200" y2="405"/>
    <line x1="0" y1="540" x2="1200" y2="540"/>
  </g>

  <!-- Right side: AI network nodes (decorative) -->
  <!-- Node connections (lines first) -->
  <g stroke="rgba(0,178,235,0.18)" stroke-width="1.2" fill="none">
    <line x1="790" y1="220" x2="960" y2="165"/>
    <line x1="960" y1="165" x2="1080" y2="290"/>
    <line x1="1080" y1="290" x2="920" y2="380"/>
    <line x1="920" y1="380" x2="790" y2="220"/>
    <line x1="790" y1="220" x2="920" y2="380"/>
    <line x1="960" y1="165" x2="1060" y2="460"/>
    <line x1="1060" y1="460" x2="920" y2="380"/>
    <line x1="1060" y1="460" x2="1080" y2="290"/>
    <line x1="920" y1="380" x2="1000" y2="530"/>
    <line x1="1000" y1="530" x2="1060" y2="460"/>
    <line x1="790" y1="220" x2="710" y2="340"/>
    <line x1="710" y1="340" x2="920" y2="380"/>
    <line x1="1130" y1="200" x2="1080" y2="290"/>
    <line x1="1130" y1="200" x2="960" y2="165"/>
  </g>

  <!-- Node glow halos (blurred, behind) -->
  <g filter="url(#node-blur)">
    <circle cx="960" cy="165" r="16" fill="rgba(0,178,235,0.35)"/>
    <circle cx="1080" cy="290" r="14" fill="rgba(0,178,235,0.28)"/>
    <circle cx="920" cy="380" r="18" fill="rgba(0,178,235,0.4)"/>
    <circle cx="790" cy="220" r="12" fill="rgba(0,178,235,0.22)"/>
    <circle cx="1060" cy="460" r="12" fill="rgba(0,178,235,0.22)"/>
  </g>

  <!-- Nodes (sharp) -->
  <!-- Hub node -->
  <circle cx="920" cy="380" r="10" fill="rgba(0,178,235,0.12)" stroke="#00B2EB" stroke-width="1.5"/>
  <circle cx="920" cy="380" r="4" fill="#00B2EB"/>
  <!-- Secondary nodes -->
  <circle cx="960" cy="165" r="8" fill="rgba(0,178,235,0.1)" stroke="rgba(0,178,235,0.5)" stroke-width="1.2"/>
  <circle cx="960" cy="165" r="3" fill="rgba(0,178,235,0.8)"/>
  <circle cx="1080" cy="290" r="7" fill="rgba(0,178,235,0.1)" stroke="rgba(0,178,235,0.45)" stroke-width="1.2"/>
  <circle cx="1080" cy="290" r="3" fill="rgba(0,178,235,0.7)"/>
  <circle cx="790" cy="220" r="6" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.18)" stroke-width="1"/>
  <circle cx="790" cy="220" r="2.5" fill="rgba(255,255,255,0.5)"/>
  <circle cx="1060" cy="460" r="6" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.18)" stroke-width="1"/>
  <circle cx="1060" cy="460" r="2.5" fill="rgba(255,255,255,0.5)"/>
  <circle cx="1000" cy="530" r="5" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  <circle cx="1000" cy="530" r="2" fill="rgba(255,255,255,0.4)"/>
  <circle cx="710" cy="340" r="5" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  <circle cx="710" cy="340" r="2" fill="rgba(255,255,255,0.4)"/>
  <circle cx="1130" cy="200" r="5" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  <circle cx="1130" cy="200" r="2" fill="rgba(255,255,255,0.4)"/>

  <!-- Vertical accent line (left edge decoration) -->
  <line x1="60" y1="80" x2="60" y2="595" stroke="rgba(0,178,235,0.22)" stroke-width="2"/>

  <!-- Badge -->
  <rect x="80" y="122" width="120" height="26" rx="13" fill="rgba(0,178,235,0.12)" stroke="rgba(0,178,235,0.3)" stroke-width="1"/>
  <text x="140" y="139" fill="#00B2EB" font-size="10" font-family="'Courier New',Consolas,monospace" text-anchor="middle" font-weight="700" letter-spacing="0.14em">VIDRA · BLOG</text>

  <!-- Main headline -->
  <text x="80" y="240" fill="rgba(255,255,255,0.97)" font-size="78" font-family="system-ui,-apple-system,sans-serif" font-weight="700" letter-spacing="-0.04em">Bienvenidos</text>
  <text x="80" y="325" fill="rgba(255,255,255,0.97)" font-size="78" font-family="system-ui,-apple-system,sans-serif" font-weight="700" letter-spacing="-0.04em">a <tspan fill="#00B2EB">Vidra IA</tspan></text>

  <!-- Divider line -->
  <line x1="80" y1="352" x2="620" y2="352" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>

  <!-- Subtitle -->
  <text x="80" y="390" fill="rgba(255,255,255,0.52)" font-size="19" font-family="system-ui,-apple-system,sans-serif" font-weight="400" letter-spacing="-0.01em">El inicio de una nueva era de</text>
  <text x="80" y="418" fill="rgba(255,255,255,0.52)" font-size="19" font-family="system-ui,-apple-system,sans-serif" font-weight="400" letter-spacing="-0.01em">productividad inteligente.</text>

  <!-- Bottom strip -->
  <line x1="0" y1="595" x2="1200" y2="595" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <rect x="0" y="595" width="1200" height="80" fill="rgba(0,0,0,0.18)"/>

  <!-- Date -->
  <text x="80" y="641" fill="rgba(255,255,255,0.35)" font-size="12" font-family="'Courier New',monospace" letter-spacing="0.1em">24 JUNIO 2026</text>

  <!-- Category badge -->
  <rect x="226" y="624" width="70" height="22" rx="11" fill="rgba(0,178,235,0.12)" stroke="rgba(0,178,235,0.25)" stroke-width="1"/>
  <text x="261" y="639" fill="#00B2EB" font-size="9" font-family="'Courier New',monospace" text-anchor="middle" font-weight="700" letter-spacing="0.1em">EMPRESA</text>

  <!-- Author -->
  <text x="1120" y="641" fill="rgba(255,255,255,0.3)" font-size="12" font-family="system-ui,sans-serif" text-anchor="end" letter-spacing="-0.01em">El equipo de Vidra IA</text>
</svg>
