services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-chatbot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: ${POSTGRES_DB:-chatbot}
    ports:
      - "5435:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-chatbot} -d ${POSTGRES_DB:-chatbot}"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: ./backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-chatbot}:${POSTGRES_PASSWORD:-changeme}@db:5432/${POSTGRES_DB:-chatbot}
      LLM_PROVIDER: ${LLM_PROVIDER:-openai}
      LLM_MODEL: ${LLM_MODEL:-gpt-4o-mini}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ADMIN_API_KEY: ${ADMIN_API_KEY:-}
    ports:
      - "8001:8000"
    volumes:
      - ./backend:/app

  web:
    image: node:22-slim
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host"
    depends_on:
      - api
    environment:
      PUBLIC_API_URL: ${PUBLIC_API_URL:-http://localhost:8001}
    ports:
      - "4322:4321"
    volumes:
      - ./web:/app
      - /app/node_modules

volumes:
  pgdata:
